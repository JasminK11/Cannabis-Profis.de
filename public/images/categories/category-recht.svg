<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="rechtCatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="800" height="800" fill="url(#rechtCatGrad)" rx="20" />
  
  <!-- Waage-Symbol -->
  <g transform="translate(400, 400)" stroke="#facc15" stroke-width="8" fill="none" stroke-linecap="round">
    <!-- Säule -->
    <line x1="0" y1="-100" x2="0" y2="150" />
    
    <!-- Balken -->
    <line x1="-120" y1="-100" x2="120" y2="-100" />
    
    <!-- Schalen -->
    <path d="M-100 -100 Q-120 -50, -100 -30 Q-80 -50, -100 -100" stroke-width="4" fill="#facc15" fill-opacity="0.3" />
    <path d="M100 -100 Q80 -50, 100 -30 Q120 -50, 100 -100" stroke-width="4" fill="#facc15" fill-opacity="0.3" />
    
    <!-- Cannabis-Blatt oben -->
    <g transform="translate(0, -130)" fill="#22c55e" stroke="none">
      <path d="M0 -30 Q20 -10, 0 20 Q-20 -10, 0 -30" />
      <line x1="0" y1="20" x2="0" y2="50" stroke="#22c55e" stroke-width="3" />
    </g>
  </g>
  
  <!-- Text -->
  <text x="400" y="650" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">Recht</text>
  <text x="400" y="700" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="24">Gesetze &amp; Regeln</text>
</svg>
