<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="medCatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="800" height="800" fill="url(#medCatGrad)" rx="20" />
  
  <!-- Medizinisches Kreuz -->
  <g transform="translate(400, 350)">
    <rect x="-100" y="-30" width="200" height="60" fill="white" rx="10" />
    <rect x="-30" y="-100" width="60" height="200" fill="white" rx="10" />
    
    <!-- Cannabis-Blatt in der Mitte -->
    <g transform="scale(0.6)" fill="#16a34a">
      <path d="M0 -50 Q25 -20, 0 20 Q-25 -20, 0 -50" />
      <path d="M-15 -20 Q-40 0, -25 30 Q-10 10, -15 -20" />
      <path d="M15 -20 Q40 0, 25 30 Q10 10, 15 -20" />
      <line x1="0" y1="20" x2="0" y2="50" stroke="#16a34a" stroke-width="5" />
    </g>
  </g>
  
  <!-- Molekül-Dekoration -->
  <g fill="white" opacity="0.3">
    <circle cx="150" cy="150" r="15" />
    <circle cx="200" cy="180" r="10" />
    <line x1="150" y1="150" x2="200" y2="180" stroke="white" stroke-width="2" />
  </g>
  
  <g fill="white" opacity="0.2">
    <circle cx="650" cy="200" r="12" />
    <circle cx="600" cy="240" r="8" />
    <line x1="650" y1="200" x2="600" y2="240" stroke="white" stroke-width="2" />
  </g>
  
  <!-- Text -->
  <text x="400" y="650" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="42" font-weight="bold">Medizinisch</text>
</svg>
