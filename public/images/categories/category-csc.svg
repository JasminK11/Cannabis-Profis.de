<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="cscCatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="800" height="800" fill="url(#cscCatGrad)" rx="20" />
  
  <!-- Haus/Club -->
  <g transform="translate(400, 400)">
    <!-- Gebäude -->
    <rect x="-100" y="-50" width="200" height="150" fill="#f3e8ff" rx="10" />
    
    <!-- Dach -->
    <path d="M-120 -50 L0 -140 L120 -50 Z" fill="#facc15" />
    
    <!-- Tür -->
    <rect x="-30" y="20" width="60" height="80" fill="#9333ea" rx="5" />
    
    <!-- Fenster -->
    <rect x="-70" y="-20" width="30" height="30" fill="#a855f7" rx="5" />
    <rect x="40" y="-20" width="30" height="30" fill="#a855f7" rx="5" />
    
    <!-- Cannabis-Blatt auf Dach -->
    <g transform="translate(0, -100)" fill="#22c55e">
      <path d="M0 -25 Q20 -5, 0 25 Q-20 -5, 0 -25" />
      <line x1="0" y1="25" x2="0" y2="45" stroke="#22c55e" stroke-width="4" />
    </g>
  </g>
  
  <!-- Menschen (abstrakt) -->
  <g transform="translate(200, 600)">
    <circle cx="0" cy="-30" r="25" fill="#facc15" />
    <rect x="-20" y="0" width="40" height="60" fill="#facc15" rx="10" />
  </g>
  
  <g transform="translate(600, 600)">
    <circle cx="0" cy="-30" r="25" fill="#facc15" />
    <rect x="-20" y="0" width="40" height="60" fill="#facc15" rx="10" />
  </g>
  
  <!-- Text -->
  <text x="400" y="720" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">CSC</text>
</svg>
