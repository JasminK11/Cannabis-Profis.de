<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="newsCatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="800" height="800" fill="url(#newsCatGrad)" rx="20" />
  
  
  <!-- Zeitung/Dokument -->
  <g transform="translate(400, 400)">
    <!-- Papier -->
    <rect x="-120" y="-150" width="240" height="300" fill="white" rx="5" />
    
    
    <!-- Überschrift -->
    <rect x="-100" y="-130" width="200" height="20" fill="#1e40af" rx="2" />
    
    
    <!-- Text-Zeilen -->
    <g fill="#9ca3af">
      <rect x="-100" y="-90" width="180" height="10" rx="2" />
      <rect x="-100" y="-70" width="200" height="10" rx="2" />
      <rect x="-100" y="-50" width="160" height="10" rx="2" />
      <rect x="-100" y="-10" width="190" height="10" rx="2" />
      <rect x="-100" y="10" width="170" height="10" rx="2" />
      <rect x="-100" y="30" width="200" height="10" rx="2" />
      <rect x="-100" y="70" width="180" height="10" rx="2" />
      <rect x="-100" y="90" width="150" height="10" rx="2" />
    </g>
    
    
    <!-- Cannabis-Symbol -->
    <g transform="translate(60, 60)" fill="#22c55e">
      <path d="M0 -20 Q15 -5, 0 15 Q-15 -5, 0 -20" />
      <line x1="0" y1="15" x2="0" y2="30" stroke="#22c55e" stroke-width="2" />
    </g>
  </g>
  
  
  <!-- Benachrichtigungs-Punkte -->
  <g fill="#facc15">
    <circle cx="200" cy="200" r="20" />
    <text x="200" y="208" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="20" font-weight="bold">!</text>
  </g>
  
  
  <!-- Text -->
  <text x="400" y="720" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">News</text>
</svg>
