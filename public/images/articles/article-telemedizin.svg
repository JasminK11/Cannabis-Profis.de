<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="teleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="1200" height="630" fill="url(#teleGrad)" />
  
  <!-- Laptop/Monitor -->
  <g transform="translate(600, 350)">
    <!-- Bildschirm -->
    <rect x="-250" y="-150" width="500" height="300" fill="#1f2937" rx="10" />
    
    <!-- Bildschirm-Inhalt -->
    <rect x="-230" y="-130" width="460" height="260" fill="#111827" />
    
    <!-- Video-Call Interface -->
    <circle cx="0" cy="-20" r="60" fill="#374151" />
    <circle cx="0" cy="-30" r="25" fill="#6b7280" />
    <path d="M-40 40 Q0 80, 40 40" fill="none" stroke="#6b7280" stroke-width="3" />
    
    <!-- Cannabis-Symbol auf Bildschirm -->
    <g transform="translate(120, -80)" fill="#22c55e">
      <path d="M0 -25 Q20 -10, 0 15 Q-20 -10, 0 -25" />
      <line x1="0" y1="15" x2="0" y2="35" stroke="#22c55e" stroke-width="3" />
    </g>
    
    <!-- Ständer -->
    <rect x="-30" y="150" width="60" height="40" fill="#374151" />
    
    <!-- Basis -->
    <rect x="-80" y="190" width="160" height="20" fill="#1f2937" rx="5" /
003e
  </g>
  
  <!-- WiFi/Signal Icons -->
  <g transform="translate(950, 150)" stroke="#facc15" stroke-width="4" fill="none">
    <path d="M0 40 Q20 20, 40 40" />
    <path d="M-10 30 Q20 0, 50 30" />
    <path d="M-20 20 Q20 -20, 60 20" />
  </g>
  
  <!-- Text-Banner -->
  <rect x="100" y="520" width="1000" height="80" fill="#000000" opacity="0.7" rx="10" />
  
  <text x="600" y="575" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="42" font-weight="bold">Telemedizin &amp; Cannabis</text>
</svg>
