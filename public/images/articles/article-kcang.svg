<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="kcangGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#166534;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="1200" height="630" fill="url(#kcangGrad)" />
  
  
  <!-- Dokument/Gesetz (abstrakt) -->
  <g transform="translate(600, 300)">
    <!-- Papier -->
    <rect x="-200" y="-250" width="400" height="500" fill="white" rx="5" />
    
    
    <!-- Text-Linien -->
    <g fill="#9ca3af">
      <rect x="-150" y="-200" width="300" height="10" rx="2" />
      <rect x="-150" y="-170" width="280" height="10" rx="2" />
      <rect x="-150" y="-140" width="300" height="10" rx="2" />
      <rect x="-150" y="-80" width="290" height="10" rx="2" />
      <rect x="-150" y="-50" width="270" height="10" rx="2" />
      <rect x="-150" y="-20" width="300" height="10" rx="2" />
      <rect x="-150" y="40" width="280" height="10" rx="2" />
      <rect x="-150" y="70" width="300" height="10" rx="2" />
      <rect x="-150" y="130" width="290" height="10" rx="2" />
      <rect x="-150" y="160" width="250" height="10" rx="2" />
    </g>
    
    
    <!-- Highlight-Marker (grün) -->
    <rect x="-155" y="-85" width="150" height="20" fill="#22c55e" opacity="0.4" rx="2" />
    
    
    <!-- Cannabis-Blatt Stempel -->
    <g transform="translate(100, 150) rotate(-15)">
      <circle r="60" fill="none" stroke="#dc2626" stroke-width="4" />
      
      <g transform="scale(0.6)" fill="#dc2626">
        <path d="M0 -50 Q25 -25, 0 20 Q-25 -25, 0 -50" />
        <path d="M-20 -25 Q-45 -5, -30 30 Q-10 10, -20 -25" />
        <path d="M20 -25 Q45 -5, 30 30 Q10 10, 20 -25" />
        <line x1="0" y1="20" x2="0" y2="50" stroke="#dc2626" stroke-width="5" />
      </g>
      
      
      <text y="40" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="14" font-weight="bold">KCanG</text>
    </g>
  </g>
  
  
  <!-- Paragraphen-Symbol -->
  <g transform="translate(150, 150)" stroke="#facc15" stroke-width="8" fill="none" stroke-linecap="round">
    <circle cx="0" cy="-20" r="25" />
    
    <line x1="0" y1="5" x2="0" y2="60" />
    
    <line x1="-20" y1="60" x2="20" y2="60" />
  </g>
  
  
  <!-- Text-Banner -->
  <rect x="100" y="550" width="1000" height="60" fill="#000000" opacity="0.7" rx="10" />
  
  
  <text x="600" y="592" text-anchor="middle" fill="#facc15" font-family="Arial, sans-serif" font-size="36" font-weight="bold">KCanG einfach erklärt</text>
</svg>
