<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="anbauGuideGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="1200" height="630" fill="url(#anbauGuideGrad)" />
  
  
  <!-- Hände, die Pflanze pflegen -->
  <g transform="translate(600, 350)">
    <!-- Pflanze -->
    <g fill="#22c55e">
      <!-- Stamm -->
      <rect x="-8" y="0" width="16" height="150" fill="#15803d" />
      
      <!-- Blätter -->
      <path d="M0 -80 Q40 -40, 0 20 Q-40 -40, 0 -80" />
      <path d="M-20 -40 Q-50 -10, -35 40 Q-15 10, -20 -40" />
      <path d="M20 -40 Q50 -10, 35 40 Q15 10, 20 -40" />
      <path d="M0 -20 Q30 10, 0 50 Q-30 10, 0 -20" />
    </g>
    
    
    <!-- Hände (stilisiert) -->
    <g fill="#fef08a" opacity="0.8">
      <!-- Linke Hand -->
      <ellipse cx="-60" cy="100" rx="30" ry="50" transform="rotate(-20 -60 100)" />
      
      <!-- Rechte Hand -->
      <ellipse cx="60" cy="100" rx="30" ry="50" transform="rotate(20 60 100)" />
    </g>
  </g>
  
  
  <!-- Tools/Elemente -->
  <g transform="translate(200, 200)" fill="#facc15" opacity="0.6">
    <!-- Gießkanne (abstrakt) -->
    <rect x="0" y="0" width="60" height="50" rx="5" />
    <rect x="50" y="-20" width="30" height="10" transform="rotate(-30 50 -20)" />
    <rect x="-10" y="10" width="10" height="30" rx="5" transform="rotate(-45 -10 10)" />
  </g>
  
  
  <g transform="translate(950, 180)" fill="#facc15" opacity="0.5">
    <!-- Samen (abstrakt) -->
    <ellipse cx="0" cy="0" rx="15" ry="20" />
    <ellipse cx="40" cy="10" rx="15" ry="20" />
    <ellipse cx="20" cy="40" rx="15" ry="20" />
  </g>
  
  
  <!-- Wachstums-Pfeile -->
  <g transform="translate(1000, 450)" stroke="#facc15" stroke-width="5" fill="none">
    <line x1="0" y1="50" x2="0" y2="-30" />
    <path d="M-20 -10 L0 -30 L20 -10" />
  </g>
  
  
  <!-- Text-Banner -->
  <rect x="100" y="520" width="1000" height="80" fill="#000000" opacity="0.6" rx="10" />
  
  <text x="600" y="575" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="44" font-weight="bold">Anbau-Anleitung</text>
</svg>
