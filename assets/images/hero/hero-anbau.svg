<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="anbauGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#facc15;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="1920" height="600" fill="url(#anbauGrad)" />
  
  <!-- Sonne -->
  <circle cx="1700" cy="100" r="120" fill="url(#sunGrad)" opacity="0.6" />
  
  <!-- Wachstums-Illustration -->
  <g transform="translate(960, 350)">
    <!-- Hauptstamm -->
    <rect x="-15" y="0" width="30" height="200" fill="#15803d" rx="5" />
    
    <!-- Blätter (verschiedene Größen) -->
    <g fill="#22c55e" opacity="0.9">
      <!-- Top-Blatt -->
      <path d="M0 -150 Q40 -100, 0 -50 Q-40 -100, 0 -150" />
      <path d="M0 -50 L0 0" stroke="#15803d" stroke-width="3" />
      
      <!-- Linke Blätter -->
      <path d="M-20 -80 Q-70 -60, -60 -20 Q-40 -40, -20 -80" />
      <path d="M-15 -100 Q-80 -80, -70 -30 Q-45 -55, -15 -100" />
      
      <!-- Rechte Blätter -->
      <path d="M20 -80 Q70 -60, 60 -20 Q40 -40, 20 -80" />
      <path d="M15 -100 Q80 -80, 70 -30 Q45 -55, 15 -100" />
    </g>
    
    <!-- Wachstums-Pfeil -->
    <g transform="translate(150, -100)" stroke="#facc15" stroke-width="4" fill="none">
      <line x1="0" y1="100" x2="0" y2="-50" />
      <path d="M-20 -30 L0 -50 L20 -30" />
    </g>
  </g>
  
  <!-- Dekorative Elemente -->
  <circle cx="200" cy="100" r="50" fill="#dcfce7" opacity="0.3" />
  <circle cx="1800" cy="500" r="80" fill="#dcfce7" opacity="0.2" />
</svg>
