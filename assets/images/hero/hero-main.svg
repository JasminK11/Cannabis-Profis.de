<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradienten -->
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#15803d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:0.4" />
    </linearGradient>
    
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dcfce7;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#86efac;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Muster -->
    <pattern id="leafPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M100 20 Q120 60 100 100 Q80 60 100 20 M100 100 L100 160 M85 130 Q100 140 115 130" 
            fill="none" stroke="#22c55e" stroke-width="1" opacity="0.1"/>
    </pattern>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="1920" height="1080" fill="url(#heroGrad)" />
  
  <!-- Muster-Overlay -->
  <rect width="1920" height="1080" fill="url(#leafPattern)" />
  
  <!-- Abstrakte Kreise -->
  <circle cx="200" cy="200" r="300" fill="url(#goldGrad)" opacity="0.3" filter="url(#glow)" />
  <circle cx="1700" cy="800" r="400" fill="url(#lightGrad)" opacity="0.4" filter="url(#glow)" />
  <circle cx="1400" cy="200" r="200" fill="#facc15" opacity="0.2" />
  <circle cx="300" cy="900" r="250" fill="#dcfce7" opacity="0.15" />
  
  <!-- Geometrische Formen -->
  <polygon points="960,100 1100,400 820,400" fill="none" stroke="#facc15" stroke-width="3" opacity="0.5" />
  <polygon points="400,600 550,900 250,900" fill="none" stroke="#86efac" stroke-width="2" opacity="0.4" />
  <polygon points="1500,300 1650,600 1350,600" fill="none" stroke="#facc15" stroke-width="2" opacity="0.3" />
  
  <!-- Linien -->
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#facc15" stroke-width="1" opacity="0.2" />
  <line x1="960" y1="0" x2="960" y2="1080" stroke="#dcfce7" stroke-width="1" opacity="0.15" />
  
  <!-- Abstrakte Cannabis-Blatt-Silhouette (zentriert, subtil) -->
  <g transform="translate(860, 340) scale(2)" opacity="0.15" fill="#facc15">
    <path d="M50 10 C60 30, 70 40, 50 60 C30 40, 40 30, 50 10 M50 60 L50 90 M35 75 Q50 85, 65 75" 
          filter="url(#glow)" />
  </g>
  
  <!-- Dekorative Punkte -->
  <g fill="#facc15" opacity="0.6">
    <circle cx="150" cy="150" r="4" />
    <circle cx="1800" cy="200" r="6" />
    <circle cx="1700" cy="950" r="5" />
    <circle cx="100" cy="900" r="7" />
    <circle cx="960" cy="540" r="3" />
  </g>
  
  <!-- Verlauf-Overlay für bessere Lesbarkeit -->
  <rect width="1920" height="1080" fill="url(#heroGrad)" opacity="0.3" />
</svg>
