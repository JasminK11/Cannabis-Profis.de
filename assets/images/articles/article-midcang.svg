<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bundestagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="germanFlag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#dd0000;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#ffce00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="1200" height="630" fill="url(#bundestagGrad)" />
  
  <!-- Bundestag Silhouette (abstrakt) -->
  <g transform="translate(600, 350)" fill="#374151">
    <!-- Hauptgebäude -->
    <rect x="-300" y="-100" width="600" height="200" />
    
    <!-- Kuppel -->
    <circle cx="0" cy="-100" r="150" fill="#4b5563" />
    
    <!-- Säulen -->
    <rect x="-250" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="-200" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="-150" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="-100" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="-50" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="30" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="80" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="130" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="180" y="-80" width="20" height="180" fill="#6b7280" />
    <rect x="230" y="-80" width="20" height="180" fill="#6b7280" />
  </g>
  
  <!-- Cannabis-Blatt Overlay -->
  <g transform="translate(600, 200)" opacity="0.8">
    <g fill="#22c55e">
      <path d="M0 -80 Q40 -40, 0 20 Q-40 -40, 0 -80" />
      <path d="M-25 -40 Q-60 -10, -45 40 Q-20 10, -25 -40" />
      <path d="M25 -40 Q60 -10, 45 40 Q20 10, 25 -40" />
      <line x1="0" y1="20" x2="0" y2="80" stroke="#22c55e" stroke-width="6" />
    </g>
  </g>
  
  <!-- Reform-Pfeil -->
  <g transform="translate(900, 150)" stroke="#facc15" stroke-width="8" fill="none">
    <line x1="0" y1="0" x2="100" y2="0" />
    <path d="M80 -20 L100 0 L80 20" />
  </g>
  
  <!-- Text-Banner -->
  <rect x="100" y="480" width="1000" height="100" fill="#000000" opacity="0.8" rx="10" />
  
  <text x="600" y="545" text-anchor="middle" fill="#facc15" font-family="Arial, sans-serif" font-size="48" font-weight="bold">MedCanG-Reform 2026</text>
</svg>
